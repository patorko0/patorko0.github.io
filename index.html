<!doctype html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TCF | Technical Creativity Framework</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 24px;
    }
    .box { max-width: 720px; }
    .tag {
      display: inline-block;
      padding: 8px 14px;
      border: 1px solid #38bdf8;
      border-radius: 999px;
      margin-bottom: 20px;
      color: #38bdf8;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }
    h1 {
      font-size: 3rem;
      margin: 0 0 12px;
    }
    p {
      font-size: 1.15rem;
      line-height: 1.6;
      color: #cbd5e1;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="tag">TCF</div>
    <h1>Technical Creativity Framework</h1>
    <p>Budujeme moderné digitálne riešenia, kreativitu a technický rast pod značkou TCF.</p>
  </div>
</body>
</html>
